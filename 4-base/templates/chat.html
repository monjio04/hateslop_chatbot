<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>괴짜오드가족</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- NanumSquare Neo (Naver CDN) -->
    <link
      rel="stylesheet"
      href="https://hangeul.pstatic.net/hangeul_static/css/NanumSquareNeo.css"
    />
    <!-- Cafe24 Dangdanghae + Nanum Gothic fallback -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cafe24+Dangdanghae&family=Nanum+Gothic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
  </head>
  <body>
    <header class="game-header">
      <h1 class="game-title">괴짜오드가족 - 친구방문 D-1</h1>
      <button
        class="close-btn"
        onclick="window.location.href='{{ url_for('index') }}'"
      >
        &times;
      </button>
    </header>

    <div class="game-container" data-username="{{ username }}">
      <!-- Left Panel -->
      <aside class="left-panel">
        <div class="scene-wrapper" style="position: relative;">
          <img
            class="scene-img"
            id="scene-img"
            src=""
            alt="scene"
            onerror="this.style.visibility='hidden'"
          />
          <img
            id="ch1-left-character-img"
            src=""
            alt="character"
            style="position: absolute; bottom: 15px; left: 15px; width: calc(100% - 30px); height: calc(100% - 30px); object-fit: contain; object-position: bottom; display: none;"
            onerror="this.style.display='none'"
          />
        </div>

        <!-- Recipe Section (CH1) -->
        <div class="recipe-section" id="recipe-section" style="display: none;">
          <img class="recipe-label-img" src="/static/images/chatbot/chat/Recipe.png" alt="Recipe Label" />
          <div class="recipe-box">
            <img class="rect38-img" src="/static/images/chatbot/chat/rect38.png" alt="recipe bg" />
            <div class="recipe-overlay">
              <div class="recipe-steps" id="recipe-steps"><span id="recipe-step-1">고기</span> → <span id="recipe-step-2">굽기</span> → <span id="recipe-step-3">소스</span> → <span id="recipe-step-4">속재료</span></div>
            </div>
          </div>
        </div>

        <!-- CH2: Convinced image -->
        <img class="convinced-img" id="convinced-label" src="/static/images/chatbot/chat/Convinced.png" alt="Convinced" style="display: none" onerror="this.style.display='none'" />
        <!-- CH2: Hearts image -->
        <div class="hearts-box" id="hearts-box" style="display: none">
          <img class="hearts-img" id="hearts-img" src="/static/images/chatbot/chat/heart_start.png" alt="hearts" onerror="this.style.visibility='hidden'" />
        </div>
      </aside>

      <!-- Right Panel -->
      <section class="right-panel">
        <div class="quest-banner" id="quest-banner"></div>

        <div id="chat-log" class="chat-log"></div>

        <div id="ch1-image-area" style="display:none; flex-shrink:0; margin-top: 26px; align-self: center; position: relative;">
          <img id="ch1-img" src="" alt="" style="max-height:180px; object-fit:contain; border-radius:8px;" onerror="this.parentElement.style.display='none'" />
          <div id="ch1-quest-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #2a0a24; font-size: 1.1rem; font-family: 'NanumSquareNeo', sans-serif; font-weight: 400; white-space: nowrap; pointer-events: none; display: none;"></div>
        </div>

        <div class="input-bar">
          <input
            type="text"
            id="user-message"
            placeholder="메시지를 입력하세요"
          />
          <button class="send-btn" id="send-btn">전송</button>
        </div>
      </section>
    </div>

    <script src="{{ url_for('static', filename='js/chatbot_single.js') }}"></script>
  </body>
</html>
