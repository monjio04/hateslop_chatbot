<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>괴짜오드가족</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- NanumSquare Neo (Naver CDN) -->
    <link
      rel="stylesheet"
      href="https://hangeul.pstatic.net/hangeul_static/css/NanumSquareNeo.css"
    />
    <!-- Cafe24 Dangdanghae + Nanum Gothic fallback -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cafe24+Dangdanghae&family=Nanum+Gothic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
  </head>
  <body>
    <header class="game-header">
      <h1 class="game-title">괴짜오드가족 - 친구방문 D-1</h1>
      <button
        class="close-btn"
        onclick="window.location.href='{{ url_for('index') }}'"
      >
        &times;
      </button>
    </header>

    <div class="game-container" data-username="{{ username }}">
      <!-- Left Panel -->
      <aside class="left-panel">
        <div class="scene-wrapper" style="position: relative;">
          <img
            class="scene-img"
            id="scene-img"
            src=""
            alt="scene"
            onerror="this.style.visibility='hidden'"
          />
          <img
            id="ch1-left-character-img"
            src=""
            alt="character"
            style="position: absolute; bottom: 15px; left: 15px; width: calc(100% - 30px); height: calc(100% - 30px); object-fit: contain; object-position: bottom; display: none;"
            onerror="this.style.display='none'"
          />
        </div>
        <!-- Bottom panel: always visible for all chapters -->
        <div class="bottom-panel" id="bottom-panel">
          <img id="bottom-label" class="bottom-label-img" src="" alt="" style="display:none;" onerror="this.style.display='none'" />
          <div class="rect38-wrapper">
            <img class="rect38-img" src="/static/images/chatbot/chat/rect38.png" alt="" onerror="this.style.visibility='hidden'" />
            <p id="recipe-steps-text" class="recipe-steps" style="display:none">빵 → 굽기 → 소스 → 속재료</p>
            <div id="hearts-box" style="display:none; position:absolute; bottom:6px; left:0; right:0; padding:0 8px;">
              <img class="hearts-img" id="hearts-img" src="/static/images/chatbot/chat/heart_start.png" alt="hearts" onerror="this.style.visibility='hidden'" />
            </div>
          </div>
        </div>
      </aside>

      <!-- Right Panel -->
      <section class="right-panel">
        <div class="quest-banner" id="quest-banner"></div>

        <div id="chat-log" class="chat-log"></div>

        <div id="ch1-image-area" style="display:none; flex-shrink:0; margin-top: 26px; align-self: center;">
          <img id="ch1-img" src="" alt="" style="max-height:180px; object-fit:contain; border-radius:8px;" onerror="this.parentElement.style.display='none'" />
        </div>

        <div class="input-bar">
          <input
            type="text"
            id="user-message"
            placeholder="메시지를 입력하세요"
          />
          <button class="send-btn" id="send-btn">전송</button>
        </div>
      </section>
    </div>

    <script src="{{ url_for('static', filename='js/chatbot_single.js') }}"></script>
  </body>
</html>
