<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>괴짜오드가족</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- NanumSquare Neo (Naver CDN) -->
    <link
      rel="stylesheet"
      href="https://hangeul.pstatic.net/hangeul_static/css/NanumSquareNeo.css"
    />
    <!-- Cafe24 Dangdanghae + Nanum Gothic fallback -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cafe24+Dangdanghae&family=Nanum+Gothic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: "NanumSquareNeo", sans-serif;
        background: #735568;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .game-header {
        background: #460c3f;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        flex-shrink: 0;
      }

      .game-title {
        color: #fff;
        font-size: 1.3rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        font-family: "Cafe24 Dangdanghae", sans-serif;
      }

      .close-btn {
        position: absolute;
        right: 20px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 1.8rem;
        cursor: pointer;
        line-height: 1;
      }
      .close-btn:hover {
        color: #fff;
      }

      /* ── Main container ──────────────────────────────────────── */
      .game-container {
        display: flex;
        height: calc(100vh - 80px);
        padding: 16px 16px 16px 20px;
        gap: 16px;
      }

      /* ── Left panel ──────────────────────────────────────────── */
      .left-panel {
        width: 380px;
        flex-shrink: 0;
        background: #a58a9b;
        border: 2px solid #a58a9b;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .scene-wrapper {
        flex: 1;
        overflow: hidden;
      }

      .scene-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .convinced-img {
        display: none;
        margin: 6px 16px 2px;
        height: 28px;
        width: auto;
      }

      .hearts-box {
        margin: 4px 16px 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hearts-img {
        width: 100%;
        height: auto;
        display: block;
      }

      /* ── Recipe section (CH1) ─────────────────────────────── */
      .recipe-section {
        position: relative;
        flex-shrink: 0;
        height: 160px;
      }

      .rect38-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .recipe-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 14px 18px;
        gap: 10px;
      }

      .recipe-label-img {
        width: 115px;
        height: 28px;
        object-fit: contain;
      }

      .recipe-steps {
        font-size: 1.4rem;
        font-weight: 800;
        color: #2a0a24;
        font-family: "Cafe24 Dangdanghae", sans-serif;
        line-height: 1.5;
      }

      /* ── Right panel ─────────────────────────────────────────── */
      .right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      /* Bot message group (avatar left, content right) */
      .bot-msg-group {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 10px;
        align-self: flex-start;
        max-width: 82%;
      }

      .bot-msg-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        object-fit: cover;
        background: #8a7a8e;
        flex-shrink: 0;
      }

      .bot-msg-content {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .bot-msg-name {
        font-size: 0.85rem;
        font-weight: 600;
        color: #f5e6f0;
        font-family: "Cafe24 Dangdanghae", sans-serif;
      }

      /* Quest banner */
      .quest-banner {
        background: #f6fbdb;
        border: 1px solid #626262;
        border-radius: 30px;
        padding: 9px 24px;
        text-align: center;
        font-size: 0.88rem;
        color: #333;
        margin-top: 29px;
        align-self: center;
        display: none;
        flex-shrink: 0;
        font-family: "Cafe24 Dangdanghae", sans-serif;
      }
      .quest-banner.visible {
        display: block;
      }

      /* Chat log */
      .chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: transparent;
      }

      .message {
        padding: 12px 16px;
        border-radius: 5px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        animation: fadeUp 0.25s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.bot {
        background: #e3cbda;
        color: #2a1a28;
      }

      .message.user {
        background: #fffff7;
        align-self: flex-end;
        color: #222;
        border: 1px solid #ddd;
        max-width: 60%;
      }

      .bot-big-img {
        display: block;
        width: 100%;
        max-width: 442px;
        height: auto;
        border-radius: 8px;
        margin: 0 auto 8px auto;
      }

      /* Input bar */
      .input-bar {
        background: #decad7;
        display: flex;
        align-items: center;
        padding: 0 16px;
        height: 65px;
        gap: 12px;
        border-radius: 5px;
        flex-shrink: 0;
      }

      .input-bar input[type="text"] {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 0.95rem;
        outline: none;
        color: #333;
      }
      .input-bar input[type="text"]::placeholder {
        color: #999;
      }

      .send-btn {
        background: #460c3f;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 8px 22px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
        font-family: "Cafe24 Dangdanghae", sans-serif;
      }
      .send-btn:hover {
        background: #6b1460;
      }
    </style>
  </head>
  <body>
    <header class="game-header">
      <h1 class="game-title">괴짜오드가족 - 친구방문 D-1</h1>
      <button
        class="close-btn"
        onclick="window.location.href='{{ url_for('index') }}'"
      >
        &times;
      </button>
    </header>

    <div class="game-container" data-username="{{ username }}">
      <!-- Left Panel -->
      <aside class="left-panel">
        <div class="scene-wrapper" style="position: relative;">
          <img
            class="scene-img"
            id="scene-img"
            src=""
            alt="scene"
            onerror="this.style.visibility='hidden'"
          />
          <img
            id="ch1-left-character-img"
            src=""
            alt="character"
            style="position: absolute; bottom: 15px; left: 15px; width: calc(100% - 30px); height: calc(100% - 30px); object-fit: contain; object-position: bottom; display: none;"
            onerror="this.style.display='none'"
          />
        </div>
        <!-- CH1: Recipe card -->
        <div class="recipe-section" id="recipe-section" style="display: none">
          <img class="rect38-img" src="/static/images/chatbot/chat/rect38.png" alt="" onerror="this.style.visibility='hidden'" />
          <div class="recipe-overlay">
            <img class="recipe-label-img" src="/static/images/chatbot/chat/Recipe.png" alt="Recipe" onerror="this.style.visibility='hidden'" />
            <p class="recipe-steps">빵 → 굽기 → 소스 → 속재료</p>
          </div>
        </div>
        <!-- CH2: Convinced image -->
        <img class="convinced-img" id="convinced-label" src="/static/images/chatbot/chat/Convinced.png" alt="Convinced" style="display: none" onerror="this.style.display='none'" />
        <!-- CH2: Hearts image -->
        <div class="hearts-box" id="hearts-box" style="display: none">
          <img class="hearts-img" id="hearts-img" src="/static/images/chatbot/chat/heart_start.png" alt="hearts" onerror="this.style.visibility='hidden'" />
        </div>
      </aside>

      <!-- Right Panel -->
      <section class="right-panel">
        <div class="quest-banner" id="quest-banner"></div>

        <div id="chat-log" class="chat-log"></div>

        <div id="ch1-image-area" style="display:none; flex-shrink:0; margin-top: 26px; align-self: center;">
          <img id="ch1-img" src="" alt="" style="max-height:180px; object-fit:contain; border-radius:8px;" onerror="this.parentElement.style.display='none'" />
        </div>

        <div class="input-bar">
          <input
            type="text"
            id="user-message"
            placeholder="메시지를 입력하세요"
          />
          <button class="send-btn" id="send-btn">전송</button>
        </div>
      </section>
    </div>

    <script src="{{ url_for('static', filename='js/chatbot_single.js') }}"></script>
  </body>
</html>
