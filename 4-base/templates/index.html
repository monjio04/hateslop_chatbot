<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bot.name }} - 오프닝</title>
    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/opening.css') }}">
</head>
<body>

    <div class="scene-container">
        <!-- 1. 배경 이미지 -->
        <img src="{{ url_for('static', filename='images/chatbot/opening/house_outside.png') }}" class="bg-img" alt="배경">

        <!-- 2. 제목 이미지 -->
        <img src="{{ url_for('static', filename='images/chatbot/opening/opening_title.png') }}" class="title-img" alt="제목">

        <!-- 3. 시작하기 버튼 -->
        <a href="{{ url_for('detail') }}" class="start-btn-link">
            <img src="{{ url_for('static', filename='images/chatbot/opening/opening_button.png') }}" class="start-btn-img" alt="시작하기">
        </a>
    </div>

    <audio id="bg-music" src="/static/sound/opening.mp3" loop autoplay></audio>
    <script>
      const bgMusic = document.getElementById('bg-music');
      bgMusic.play().catch(() => {});
    </script>
</body>
</html>
