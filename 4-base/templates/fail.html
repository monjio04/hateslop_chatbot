<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD ENDING - 괴짜 가족에서 살아남기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fail.css') }}?v=1.3">
</head>

<body>
    <div class="ending-container">
        <div class="ending-image-wrapper">
            {% if image %}
            <img src="{{ image }}" alt="Ending Image" class="ending-image">
            {% else %}
            <div class="game-over-text">GAME OVER</div>
            {% endif %}

            <img src="/static/images/chatbot/fail/fail_button.png" alt="Fail Logo" class="fail-logo">
        </div>

        <p class="ending-desc">{{ desc if desc else "살아남지 못했습니다..." }}</p>
    </div>

    <a href="/chat?username={{ username }}" class="reset-btn-link">
        <img src="/static/images/chatbot/fail/reset_button.png" alt="Reset" class="reset-btn-img">
    </a>
</body>
</html>
