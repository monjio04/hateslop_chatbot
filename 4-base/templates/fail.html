<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD ENDING - 괴짜 가족에서 살아남기</title>
    <style>
        @font-face {
            font-family: 'NanumSquareNeo';
            src: url('https://hangeul.naver.com/static/fonts/nanum/NanumSquareNeo-Variable.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Cafe24 Dangdanghae';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Dangdanghae.woff') format('woff');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a0a24;
            color: #fff;
            font-family: "NanumSquareNeo", sans-serif;
            overflow: hidden;
        }

        .fail-container {
            width: 90%;
            max-width: 600px;
            background: #460c3f;
            border: 4px solid #f5e6f0;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
            position: relative;
        }

        .fail-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            border-radius: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fail-title {
            font-family: "Cafe24 Dangdanghae", sans-serif;
            font-size: 3.5rem;
            color: #ff4d4d;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 2px;
        }

        .ending-image-wrapper {
            width: 100%;
            height: 250px;
            background: #1a0516;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #5a1251;
        }

        .ending-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.3) contrast(1.1);
        }

        .ending-desc {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #f5e6f0;
            margin-bottom: 35px;
            white-space: pre-wrap;
            min-height: 80px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 35px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            font-family: "Cafe24 Dangdanghae", sans-serif;
            display: inline-block;
        }

        .btn-retry {
            background: #f5e6f0;
            color: #460c3f;
            border: none;
            box-shadow: 0 4px 0 #bfa9b8;
        }

        .btn-retry:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #bfa9b8;
        }

        .btn-home {
            background: transparent;
            color: #f5e6f0;
            border: 2px solid #f5e6f0;
        }

        .btn-home:hover {
            background: rgba(245, 230, 240, 0.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="fail-container">
        <h1 class="fail-title">BAD ENDING</h1>

        <div class="ending-image-wrapper">
            {% if image %}
            <img src="{{ image }}" alt="Ending Image" class="ending-image" onerror="this.src='/static/images/hateslop/club_logo.png'; this.style.objectFit='contain';">
            {% else %}
            <div style="font-family: 'Cafe24 Dangdanghae'; color: #6b1460; font-size: 1.5rem;">NO IMAGE</div>
            {% endif %}
        </div>

        <p class="ending-desc">{{ desc if desc else "살아남지 못했습니다..." }}</p>

        <div class="btn-group">
            <a href="/chat" class="btn btn-retry">다시 도전하기</a>
            <a href="/" class="btn btn-home">메인으로</a>
        </div>
    </div>
</body>
</html>
